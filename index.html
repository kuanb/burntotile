<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>burntotile</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ── Left panel ─────────────────────────────────────────────────────── */
    #panel {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }

    /* Drop zone */
    #drop-zone {
      background: rgba(255,255,255,0.92);
      border: 2px dashed #aaa;
      border-radius: 6px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      color: #555;
      line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: #dc3c3c;
      background: rgba(255,240,240,0.96);
      color: #b01010;
    }
    #drop-zone strong { display: block; font-size: 14px; margin-bottom: 4px; }

    /* Controls row: zoom dropdown + clear button */
    #controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #controls label {
      white-space: nowrap;
      color: #333;
      background: rgba(255,255,255,0.88);
      padding: 2px 4px;
      border-radius: 3px;
    }
    #zoom-select {
      flex: 1;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      font-size: 13px;
    }
    #clear-btn {
      padding: 4px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: background 0.1s;
    }
    #clear-btn:hover { background: #f0e8e8; border-color: #c44; color: #c00; }

    /* Output section */
    #output-section { display: none; flex-direction: column; gap: 4px; }
    #output-section.visible { display: flex; }
    #output-hint {
      color: #555;
      font-size: 11px;
      background: rgba(255,255,255,0.7);
      padding: 2px 4px;
      border-radius: 3px;
    }
    #output-box {
      background: rgba(255,255,255,0.92);
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-family: monospace;
      font-size: 11px;
      height: 160px;
      overflow-y: auto;
      white-space: pre;
      cursor: pointer;
      line-height: 1.5;
      color: #222;
      transition: background 0.15s;
    }
    #output-box:hover { background: rgba(240, 250, 240, 0.96); }
    #output-box.copied {
      background: rgba(200, 240, 200, 0.96);
      border-color: #5a5;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Left panel -->
  <div id="panel">
    <div id="drop-zone" tabindex="0" role="button" aria-label="Drop GeoJSON or click to open file picker">
      <strong>Drop GeoJSON here</strong>
      or click to browse
    </div>

    <div id="controls">
      <label for="zoom-select">QK zoom</label>
      <select id="zoom-select"></select>
      <button id="clear-btn">Clear</button>
    </div>

    <div id="output-section">
      <div id="output-hint">Click the box to copy all quadkeys</div>
      <div id="output-box" role="button" tabindex="0" aria-label="Quadkey results — click to copy"></div>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept=".json,.geojson" style="display:none">

  <script>
    // ── Tile / quadkey math ────────────────────────────────────────────────

    function lngToTileX(lng, z) {
      return Math.floor((lng + 180) / 360 * Math.pow(2, z));
    }

    function latToTileY(lat, z) {
      const r = lat * Math.PI / 180;
      return Math.floor(
        (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z)
      );
    }

    function tileYToLat(y, z) {
      const n = Math.PI - (2 * Math.PI * y) / Math.pow(2, z);
      return (180 / Math.PI) * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
    }

    function tileToBBox(x, y, z) {
      const n = Math.pow(2, z);
      return [
        x / n * 360 - 180,          // west
        tileYToLat(y + 1, z),       // south
        (x + 1) / n * 360 - 180,   // east
        tileYToLat(y, z)            // north
      ];
    }

    function tileToQuadkey(x, y, z) {
      let key = '';
      for (let i = z; i > 0; i--) {
        let digit = 0;
        const mask = 1 << (i - 1);
        if (x & mask) digit += 1;
        if (y & mask) digit += 2;
        key += digit;
      }
      return key;
    }

    // ── Quadkey grid overlay ───────────────────────────────────────────────

    // Pick the quadkey zoom so ~4 tiles span the viewport width.
    // From: 360 / 2^Z ≈ viewportWidth / 4  →  Z ≈ log2(1440 / viewportWidth)
    function getGridZoom(map) {
      const bounds = map.getBounds();
      let width = bounds.getEast() - bounds.getWest();
      if (width <= 0) width += 360;
      width = Math.min(width, 360);
      return Math.max(1, Math.min(28, Math.round(Math.log2(1440 / width))));
    }

    function buildQKGrid(map) {
      const z       = getGridZoom(map);
      const maxIdx  = Math.pow(2, z) - 1;
      const bounds  = map.getBounds();
      const sw      = bounds.getSouthWest();
      const ne      = bounds.getNorthEast();

      const xMin = Math.max(0,      lngToTileX(Math.max(-180,    sw.lng), z));
      const xMax = Math.min(maxIdx, lngToTileX(Math.min(179.999, ne.lng), z));
      const yMin = Math.max(0,      latToTileY(Math.min( 85.051, ne.lat), z));
      const yMax = Math.min(maxIdx, latToTileY(Math.max(-85.051, sw.lat), z));

      const features = [];
      for (let x = xMin; x <= xMax; x++) {
        for (let y = yMin; y <= yMax; y++) {
          const [west, south, east, north] = tileToBBox(x, y, z);
          features.push({
            type: 'Feature',
            geometry: {
              type: 'Polygon',
              coordinates: [[[west, north], [east, north], [east, south], [west, south], [west, north]]]
            },
            properties: { qk: tileToQuadkey(x, y, z) }
          });
        }
      }
      return { type: 'FeatureCollection', features };
    }

    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        glyphs: 'https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf',
        sources: {
          'carto-light': {
            type: 'raster',
            tiles: [
              'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
              'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
              'https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png'
            ],
            tileSize: 256,
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>'
          }
        },
        layers: [{ id: 'carto-light-tiles', type: 'raster', source: 'carto-light' }]
      },
      center: [0, 20],
      zoom: 2
    });

    map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    // ── GeoJSON validation ────────────────────────────────────────────────

    const VALID_GEOJSON_TYPES = new Set([
      'Point','MultiPoint','LineString','MultiLineString',
      'Polygon','MultiPolygon','GeometryCollection',
      'Feature','FeatureCollection'
    ]);

    function validateGeoJSON(gj) {
      if (!gj || typeof gj !== 'object') throw new Error('Not a valid JSON object.');
      if (!gj.type) throw new Error('Missing "type" property.');
      if (!VALID_GEOJSON_TYPES.has(gj.type)) throw new Error(`Unknown GeoJSON type: "${gj.type}".`);
      if (gj.type === 'Feature') {
        if (!gj.geometry) throw new Error('Feature has null or missing geometry.');
        validateGeoJSON(gj.geometry);
      }
      if (gj.type === 'FeatureCollection') {
        if (!Array.isArray(gj.features)) throw new Error('FeatureCollection missing features array.');
        for (const f of gj.features) validateGeoJSON(f);
      }
    }

    // ── Intersection helpers ──────────────────────────────────────────────

    // Check if point p=[lng,lat] is inside bbox [west,south,east,north]
    function ptInBBox(bbox, p) {
      return p[0] >= bbox[0] && p[0] <= bbox[2] && p[1] >= bbox[1] && p[1] <= bbox[3];
    }

    // Ray-casting point-in-ring test
    function ptInRing(ring, p) {
      const [x, y] = p;
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const [xi, yi] = ring[i], [xj, yj] = ring[j];
        if ((yi > y) !== (yj > y) && x < (xj - xi) * (y - yi) / (yj - yi) + xi) {
          inside = !inside;
        }
      }
      return inside;
    }

    // Strict segment-segment intersection (open endpoints)
    function segsIntersect(a1, a2, b1, b2) {
      const dx1 = a2[0]-a1[0], dy1 = a2[1]-a1[1];
      const dx2 = b2[0]-b1[0], dy2 = b2[1]-b1[1];
      const den = dx1*dy2 - dy1*dx2;
      if (Math.abs(den) < 1e-12) return false;
      const t = ((b1[0]-a1[0])*dy2 - (b1[1]-a1[1])*dx2) / den;
      const u = ((b1[0]-a1[0])*dy1 - (b1[1]-a1[1])*dx1) / den;
      return t >= 0 && t <= 1 && u >= 0 && u <= 1;
    }

    // Does a polygon ring intersect tile bbox [west,south,east,north]?
    function ringIntersectsTile(ring, bbox) {
      const [west, south, east, north] = bbox;
      const tileCorners = [[west,south],[east,south],[east,north],[west,north]];
      const tileEdges   = [
        [[west,south],[east,south]], [[east,south],[east,north]],
        [[east,north],[west,north]], [[west,north],[west,south]]
      ];

      for (const pt of ring)         if (ptInBBox(bbox, pt))        return true;
      for (const pt of tileCorners)  if (ptInRing(ring, pt))        return true;
      for (let i = 0; i < ring.length - 1; i++) {
        for (const [b1,b2] of tileEdges) {
          if (segsIntersect(ring[i], ring[i+1], b1, b2)) return true;
        }
      }
      return false;
    }

    // ── Per-geometry coverage ─────────────────────────────────────────────

    function pointCoverage(coord, z) {
      const x = lngToTileX(coord[0], z);
      const y = latToTileY(coord[1], z);
      return [tileToQuadkey(x, y, z)];
    }

    // Bresenham line traversal through tile grid (with recursive subdivision
    // for long segments to correct for Mercator distortion).
    function* segCoverage(lng0, lat0, lng1, lat1, z) {
      const nMax = Math.pow(2, z) - 1;
      const x0 = Math.min(nMax, Math.max(0, lngToTileX(lng0, z)));
      const y0 = Math.min(nMax, Math.max(0, latToTileY(lat0, z)));
      const x1 = Math.min(nMax, Math.max(0, lngToTileX(lng1, z)));
      const y1 = Math.min(nMax, Math.max(0, latToTileY(lat1, z)));

      // Subdivide long segments so Mercator distortion doesn't cause gaps
      if (Math.abs(x1-x0) > 32 || Math.abs(y1-y0) > 32) {
        const mLng = (lng0+lng1)/2, mLat = (lat0+lat1)/2;
        yield* segCoverage(lng0, lat0, mLng, mLat, z);
        yield* segCoverage(mLng, mLat, lng1, lat1, z);
        return;
      }

      yield tileToQuadkey(x0, y0, z);
      if (x0 === x1 && y0 === y1) return;

      const dx = Math.abs(x1-x0), dy = Math.abs(y1-y0);
      const sx = x0 < x1 ? 1 : -1,  sy = y0 < y1 ? 1 : -1;
      let err = dx - dy, x = x0, y = y0;
      while (x !== x1 || y !== y1) {
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; x += sx; }
        if (e2 <  dx) { err += dx; y += sy; }
        yield tileToQuadkey(x, y, z);
      }
    }

    function lineStringCoverage(coords, z) {
      const s = new Set();
      for (let i = 0; i < coords.length - 1; i++) {
        for (const qk of segCoverage(coords[i][0], coords[i][1], coords[i+1][0], coords[i+1][1], z)) {
          s.add(qk);
        }
      }
      return [...s];
    }

    function polygonCoverage(coordinates, z) {
      const outer = coordinates[0];
      const lngs  = outer.map(p => p[0]);
      const lats  = outer.map(p => p[1]);
      const nMax  = Math.pow(2, z) - 1;

      const xMin = Math.max(0,    lngToTileX(Math.min(...lngs), z));
      const xMax = Math.min(nMax, lngToTileX(Math.max(...lngs), z));
      const yMin = Math.max(0,    latToTileY(Math.min( 85.051, Math.max(...lats)), z));
      const yMax = Math.min(nMax, latToTileY(Math.max(-85.051, Math.min(...lats)), z));

      const estimated = (xMax - xMin + 1) * (yMax - yMin + 1);
      if (estimated > 500_000) {
        throw new Error(
          `Bounding box at Z${z} would cover ~${estimated.toLocaleString()} tiles. ` +
          'Try a lower zoom level.'
        );
      }

      const s = new Set();
      for (let x = xMin; x <= xMax; x++) {
        for (let y = yMin; y <= yMax; y++) {
          if (ringIntersectsTile(outer, tileToBBox(x, y, z))) {
            s.add(tileToQuadkey(x, y, z));
          }
        }
      }
      return [...s];
    }

    function geomCoverage(geom, z) {
      switch (geom.type) {
        case 'Point':           return pointCoverage(geom.coordinates, z);
        case 'MultiPoint':      return geom.coordinates.flatMap(c => pointCoverage(c, z));
        case 'LineString':      return lineStringCoverage(geom.coordinates, z);
        case 'MultiLineString': return geom.coordinates.flatMap(c => lineStringCoverage(c, z));
        case 'Polygon':         return polygonCoverage(geom.coordinates, z);
        case 'MultiPolygon':    return geom.coordinates.flatMap(c => polygonCoverage(c, z));
        case 'GeometryCollection':
          return geom.geometries.flatMap(g => geomCoverage(g, z));
        default:
          throw new Error(`Unsupported geometry type: "${geom.type}".`);
      }
    }

    // Returns a sorted, deduplicated array of quadkey strings.
    function burnGeoJSON(gj, z) {
      validateGeoJSON(gj);
      const all = new Set();
      const add = geom => { if (geom) geomCoverage(geom, z).forEach(qk => all.add(qk)); };

      if (gj.type === 'FeatureCollection') gj.features.forEach(f => add(f.geometry));
      else if (gj.type === 'Feature')      add(gj.geometry);
      else                                 add(gj);

      return [...all].sort();
    }

    // ── Bbox helper (for map fit) ─────────────────────────────────────────

    function computeBBox(gj) {
      const b = [Infinity, Infinity, -Infinity, -Infinity];
      const pt = c => {
        b[0] = Math.min(b[0], c[0]); b[1] = Math.min(b[1], c[1]);
        b[2] = Math.max(b[2], c[0]); b[3] = Math.max(b[3], c[1]);
      };
      function walk(c, d) {
        if (d === 0) { pt(c); return; }
        for (const x of c) walk(x, d - 1);
      }
      const depths = {Point:0,MultiPoint:1,LineString:1,MultiLineString:2,
                      Polygon:2,MultiPolygon:3};
      function geom(g) {
        if (!g) return;
        if (g.type === 'GeometryCollection') { g.geometries.forEach(geom); return; }
        if (depths[g.type] !== undefined) walk(g.coordinates, depths[g.type]);
      }
      if      (gj.type === 'FeatureCollection') gj.features.forEach(f => geom(f.geometry));
      else if (gj.type === 'Feature')           geom(gj.geometry);
      else                                       geom(gj);
      return b;
    }

    // ── Burn + display ────────────────────────────────────────────────────

    function displayGeoJSONOnMap(geojson) {
      if (map.getLayer('burned-fill'))    map.removeLayer('burned-fill');
      if (map.getLayer('burned-line'))    map.removeLayer('burned-line');
      if (map.getSource('burned-geojson')) map.removeSource('burned-geojson');

      map.addSource('burned-geojson', { type: 'geojson', data: geojson });
      map.addLayer({
        id: 'burned-fill', type: 'fill', source: 'burned-geojson',
        paint: { 'fill-color': '#2471a3', 'fill-opacity': 0.18 }
      }, 'qk-grid-lines');
      map.addLayer({
        id: 'burned-line', type: 'line', source: 'burned-geojson',
        paint: { 'line-color': '#2471a3', 'line-width': 1.5 }
      }, 'qk-grid-lines');

      const bb = computeBBox(geojson);
      if (bb[0] !== Infinity) {
        map.fitBounds([[bb[0], bb[1]], [bb[2], bb[3]]], { padding: 60, maxZoom: 15 });
      }
    }

    function performBurn() {
      if (!panelState.geojson) return;
      const z = parseInt(zoomSelect.value, 10);
      let keys;
      try {
        keys = burnGeoJSON(panelState.geojson, z);
      } catch (err) {
        showError(err.message);
        return;
      }
      if (keys.length === 0) {
        showError('No quadkeys generated — the geometry may be empty or outside valid bounds.');
        return;
      }
      showResults(keys);
      const label = keys.length === 1 ? '1 quadkey' : `${keys.length.toLocaleString()} quadkeys`;
      dropZone.querySelector('strong').textContent = `${label} at Z${z}`;
    }

    // ── Panel: state ─────────────────────────────────────────────────────

    let panelState = {
      geojson: null,   // parsed GeoJSON currently loaded
      results: []      // array of quadkey strings from last burn
    };

    // ── Panel: DOM refs ───────────────────────────────────────────────────

    const dropZone     = document.getElementById('drop-zone');
    const zoomSelect   = document.getElementById('zoom-select');
    const clearBtn     = document.getElementById('clear-btn');
    const outputSection = document.getElementById('output-section');
    const outputBox    = document.getElementById('output-box');
    const fileInput    = document.getElementById('file-input');

    // Populate zoom dropdown 2–28
    for (let z = 2; z <= 28; z++) {
      const opt = document.createElement('option');
      opt.value = z;
      opt.textContent = `Z${z}`;
      if (z === 12) opt.selected = true;
      zoomSelect.appendChild(opt);
    }

    // ── Panel: helpers ────────────────────────────────────────────────────

    function showResults(keys) {
      panelState.results = keys;
      outputBox.textContent = keys.join('\n');
      outputSection.classList.add('visible');
    }

    function clearPanel() {
      panelState.geojson = null;
      panelState.results = [];
      outputSection.classList.remove('visible');
      outputBox.textContent = '';
      outputBox.classList.remove('copied');
      dropZone.querySelector('strong').textContent = 'Drop GeoJSON here';

      // Remove any burned geometry layer
      if (map.getLayer('burned-fill'))   map.removeLayer('burned-fill');
      if (map.getLayer('burned-line'))   map.removeLayer('burned-line');
      if (map.getSource('burned-geojson')) map.removeSource('burned-geojson');
    }

    // ── Panel: drag-and-drop + file picker ────────────────────────────────

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') fileInput.click();
    });

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) handleFile(file);
      fileInput.value = '';
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = ev => onGeoJSONLoaded(ev.target.result, file.name);
      reader.readAsText(file);
    }

    function onGeoJSONLoaded(text, filename) {
      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch (err) {
        showError(`JSON parse error: ${err.message}`);
        return;
      }
      try {
        validateGeoJSON(parsed);
      } catch (err) {
        showError(`Invalid GeoJSON: ${err.message}`);
        return;
      }
      panelState.geojson = parsed;
      dropZone.querySelector('strong').textContent = filename || 'GeoJSON loaded';
      displayGeoJSONOnMap(parsed);
      performBurn();
    }

    // ── Panel: clear button ───────────────────────────────────────────────

    clearBtn.addEventListener('click', clearPanel);

    // Re-burn when zoom level changes (if GeoJSON is already loaded)
    zoomSelect.addEventListener('change', performBurn);

    // ── Panel: click-to-copy ──────────────────────────────────────────────

    outputBox.addEventListener('click', () => {
      if (!panelState.results.length) return;
      navigator.clipboard.writeText(panelState.results.join('\n')).then(() => {
        outputBox.classList.add('copied');
        setTimeout(() => outputBox.classList.remove('copied'), 1200);
      });
    });
    outputBox.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') outputBox.click();
    });

    // ── Error modal (stub — wired up in Phase 4) ──────────────────────────

    function showError(msg) {
      // eslint-disable-next-line no-console
      console.error('[burntotile]', msg);
      let modal = document.getElementById('error-modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'error-modal';
        Object.assign(modal.style, {
          position: 'fixed', inset: '0', display: 'flex',
          alignItems: 'center', justifyContent: 'center', zIndex: '9999',
          background: 'rgba(0,0,0,0.35)'
        });
        document.body.appendChild(modal);
      }
      modal.innerHTML = `
        <div style="background:#c0392b;color:#fff;padding:24px 28px;border-radius:8px;
                    max-width:420px;font-family:system-ui,sans-serif;line-height:1.5;
                    box-shadow:0 4px 24px rgba(0,0,0,0.4)">
          <strong style="display:block;font-size:15px;margin-bottom:8px">Error</strong>
          <span>${msg}</span>
          <div style="text-align:right;margin-top:16px">
            <button onclick="this.closest('#error-modal').remove()"
              style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);
                     padding:6px 16px;border-radius:4px;cursor:pointer;font-size:13px">
              Dismiss
            </button>
          </div>
        </div>`;
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    // ── Wire up quadkey grid after map loads ──────────────────────────────

    map.on('load', () => {
      map.addSource('qk-grid', {
        type: 'geojson',
        data: buildQKGrid(map)
      });

      // Tile outline strokes
      map.addLayer({
        id: 'qk-grid-lines',
        type: 'line',
        source: 'qk-grid',
        paint: {
          'line-color': 'rgba(220, 60, 60, 0.55)',
          'line-width': 1.5
        }
      });

      // Quadkey string labels at tile centers
      map.addLayer({
        id: 'qk-grid-labels',
        type: 'symbol',
        source: 'qk-grid',
        layout: {
          'text-field': ['get', 'qk'],
          'text-font': ['Noto Sans Regular'],
          'text-size': 12,
          'text-anchor': 'center',
          'text-allow-overlap': true,
          'symbol-placement': 'point'
        },
        paint: {
          'text-color': 'rgba(180, 30, 30, 0.95)',
          'text-halo-color': 'rgba(255, 255, 255, 0.9)',
          'text-halo-width': 2
        }
      });

      map.on('moveend', () => {
        map.getSource('qk-grid').setData(buildQKGrid(map));
      });
    });
  </script>
</body>
</html>
