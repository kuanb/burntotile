<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>burntotile</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ── Left panel ─────────────────────────────────────────────────────── */
    #panel {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 260px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
      font-family: system-ui, sans-serif;
      font-size: 13px;
    }

    /* Drop zone */
    #drop-zone {
      background: rgba(255,255,255,0.92);
      border: 2px dashed #aaa;
      border-radius: 6px;
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      color: #555;
      line-height: 1.4;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    #drop-zone:hover,
    #drop-zone.drag-over {
      border-color: #dc3c3c;
      background: rgba(255,240,240,0.96);
      color: #b01010;
    }
    #drop-zone strong { display: block; font-size: 14px; margin-bottom: 4px; }

    /* Controls row: zoom dropdown + clear button */
    #controls {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    #controls label {
      white-space: nowrap;
      color: #333;
      background: rgba(255,255,255,0.88);
      padding: 2px 4px;
      border-radius: 3px;
    }
    #zoom-select {
      flex: 1;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      font-size: 13px;
    }
    #clear-btn {
      padding: 4px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: background 0.1s;
    }
    #clear-btn:hover { background: #f0e8e8; border-color: #c44; color: #c00; }

    /* Output section */
    #output-section { display: none; flex-direction: column; gap: 4px; }
    #output-section.visible { display: flex; }
    #output-hint {
      color: #555;
      font-size: 11px;
      background: rgba(255,255,255,0.7);
      padding: 2px 4px;
      border-radius: 3px;
    }
    #output-box {
      background: rgba(255,255,255,0.92);
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      font-family: monospace;
      font-size: 11px;
      height: 160px;
      overflow-y: auto;
      white-space: pre;
      cursor: pointer;
      line-height: 1.5;
      color: #222;
      transition: background 0.15s;
    }
    #output-box:hover { background: rgba(240, 250, 240, 0.96); }
    #output-box.copied {
      background: rgba(200, 240, 200, 0.96);
      border-color: #5a5;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Left panel -->
  <div id="panel">
    <div id="drop-zone" tabindex="0" role="button" aria-label="Drop GeoJSON or click to open file picker">
      <strong>Drop GeoJSON here</strong>
      or click to browse
    </div>

    <div id="controls">
      <label for="zoom-select">QK zoom</label>
      <select id="zoom-select"></select>
      <button id="clear-btn">Clear</button>
    </div>

    <div id="output-section">
      <div id="output-hint">Click the box to copy all quadkeys</div>
      <div id="output-box" role="button" tabindex="0" aria-label="Quadkey results — click to copy"></div>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept=".json,.geojson" style="display:none">

  <script type="module">
    import { Protocol } from 'https://unpkg.com/pmtiles@3/dist/pmtiles.js';

    const protocol = new Protocol();
    maplibregl.addProtocol('pmtiles', protocol.tile);

    // ── Tile / quadkey math ────────────────────────────────────────────────

    function lngToTileX(lng, z) {
      return Math.floor((lng + 180) / 360 * Math.pow(2, z));
    }

    function latToTileY(lat, z) {
      const r = lat * Math.PI / 180;
      return Math.floor(
        (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z)
      );
    }

    function tileYToLat(y, z) {
      const n = Math.PI - (2 * Math.PI * y) / Math.pow(2, z);
      return (180 / Math.PI) * Math.atan(0.5 * (Math.exp(n) - Math.exp(-n)));
    }

    function tileToBBox(x, y, z) {
      const n = Math.pow(2, z);
      return [
        x / n * 360 - 180,          // west
        tileYToLat(y + 1, z),       // south
        (x + 1) / n * 360 - 180,   // east
        tileYToLat(y, z)            // north
      ];
    }

    function tileToQuadkey(x, y, z) {
      let key = '';
      for (let i = z; i > 0; i--) {
        let digit = 0;
        const mask = 1 << (i - 1);
        if (x & mask) digit += 1;
        if (y & mask) digit += 2;
        key += digit;
      }
      return key;
    }

    // ── Quadkey grid overlay ───────────────────────────────────────────────

    // Pick the quadkey zoom so ~4 tiles span the viewport width.
    // From: 360 / 2^Z ≈ viewportWidth / 4  →  Z ≈ log2(1440 / viewportWidth)
    function getGridZoom(map) {
      const bounds = map.getBounds();
      let width = bounds.getEast() - bounds.getWest();
      if (width <= 0) width += 360;
      width = Math.min(width, 360);
      return Math.max(1, Math.min(28, Math.round(Math.log2(1440 / width))));
    }

    function buildQKGrid(map) {
      const z       = getGridZoom(map);
      const maxIdx  = Math.pow(2, z) - 1;
      const bounds  = map.getBounds();
      const sw      = bounds.getSouthWest();
      const ne      = bounds.getNorthEast();

      const xMin = Math.max(0,      lngToTileX(Math.max(-180,    sw.lng), z));
      const xMax = Math.min(maxIdx, lngToTileX(Math.min(179.999, ne.lng), z));
      const yMin = Math.max(0,      latToTileY(Math.min( 85.051, ne.lat), z));
      const yMax = Math.min(maxIdx, latToTileY(Math.max(-85.051, sw.lat), z));

      const features = [];
      for (let x = xMin; x <= xMax; x++) {
        for (let y = yMin; y <= yMax; y++) {
          const [west, south, east, north] = tileToBBox(x, y, z);
          features.push({
            type: 'Feature',
            geometry: {
              type: 'Polygon',
              coordinates: [[[west, north], [east, north], [east, south], [west, south], [west, north]]]
            },
            properties: { qk: tileToQuadkey(x, y, z) }
          });
        }
      }
      return { type: 'FeatureCollection', features };
    }

    const OVERTURE_RELEASE = '2025-12-17';
    const OVERTURE_URL = `https://overturemaps-tiles-us-west-2-beta.s3.amazonaws.com/${OVERTURE_RELEASE}`;
    const ATTR = '© <a href="https://overturemaps.org">Overture Maps Foundation</a>';

    const map = new maplibregl.Map({
      container: 'map',
      style: {
        version: 8,
        glyphs: 'https://cdn.protomaps.com/fonts/pbf/{fontstack}/{range}.pbf',
        sources: {
          'ov-base': {
            type: 'vector',
            url: `pmtiles://${OVERTURE_URL}/base.pmtiles`,
            attribution: ATTR
          },
          'ov-transport': {
            type: 'vector',
            url: `pmtiles://${OVERTURE_URL}/transportation.pmtiles`,
            attribution: ATTR
          },
          'ov-buildings': {
            type: 'vector',
            url: `pmtiles://${OVERTURE_URL}/buildings.pmtiles`,
            attribution: ATTR
          }
        },
        layers: [
          {
            id: 'background',
            type: 'background',
            paint: { 'background-color': '#f5f3ef' }
          },
          {
            id: 'land',
            type: 'fill',
            source: 'ov-base',
            'source-layer': 'land',
            paint: { 'fill-color': '#f0ece4' }
          },
          {
            id: 'landuse-green',
            type: 'fill',
            source: 'ov-base',
            'source-layer': 'land_use',
            filter: ['match', ['get', 'subtype'],
              ['park', 'forest', 'nature_reserve', 'meadow', 'grass'], true, false],
            paint: { 'fill-color': '#bfd4b0', 'fill-opacity': 0.7 }
          },
          {
            id: 'water',
            type: 'fill',
            source: 'ov-base',
            'source-layer': 'water',
            paint: { 'fill-color': '#aacfe0' }
          },
          // Primary roads — casing (outline)
          {
            id: 'roads-primary-casing',
            type: 'line',
            source: 'ov-transport',
            'source-layer': 'segment',
            minzoom: 7,
            filter: ['all',
              ['==', ['get', 'subtype'], 'road'],
              ['match', ['get', 'class'], ['motorway', 'trunk', 'primary'], true, false]
            ],
            paint: {
              'line-color': '#c8a840',
              'line-width': ['interpolate', ['linear'], ['zoom'], 7, 3, 12, 9, 18, 22],
              'line-cap': 'round', 'line-join': 'round'
            }
          },
          // Primary roads — fill
          {
            id: 'roads-primary',
            type: 'line',
            source: 'ov-transport',
            'source-layer': 'segment',
            minzoom: 7,
            filter: ['all',
              ['==', ['get', 'subtype'], 'road'],
              ['match', ['get', 'class'], ['motorway', 'trunk', 'primary'], true, false]
            ],
            paint: {
              'line-color': '#fce08a',
              'line-width': ['interpolate', ['linear'], ['zoom'], 7, 2, 12, 6, 18, 16],
              'line-cap': 'round', 'line-join': 'round'
            }
          },
          // Secondary / tertiary roads
          {
            id: 'roads-secondary',
            type: 'line',
            source: 'ov-transport',
            'source-layer': 'segment',
            minzoom: 10,
            filter: ['all',
              ['==', ['get', 'subtype'], 'road'],
              ['match', ['get', 'class'], ['secondary', 'tertiary'], true, false]
            ],
            paint: {
              'line-color': '#ffffff',
              'line-width': ['interpolate', ['linear'], ['zoom'], 10, 1, 14, 5, 18, 12],
              'line-cap': 'round', 'line-join': 'round'
            }
          },
          // Minor / residential roads
          {
            id: 'roads-minor',
            type: 'line',
            source: 'ov-transport',
            'source-layer': 'segment',
            minzoom: 13,
            filter: ['all',
              ['==', ['get', 'subtype'], 'road'],
              ['match', ['get', 'class'],
                ['residential', 'service', 'unclassified', 'living_street', 'pedestrian', 'track'],
                true, false]
            ],
            paint: {
              'line-color': '#ffffff',
              'line-width': ['interpolate', ['linear'], ['zoom'], 13, 1, 18, 8],
              'line-cap': 'round', 'line-join': 'round'
            }
          },
          // Buildings
          {
            id: 'buildings',
            type: 'fill',
            source: 'ov-buildings',
            'source-layer': 'buildings',
            minzoom: 14,
            paint: {
              'fill-color': '#d9d0c8',
              'fill-outline-color': '#bbb2a9'
            }
          }
        ]
      },
      center: [0, 20],
      zoom: 2
    });

    map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    // ── Panel: state ─────────────────────────────────────────────────────

    let panelState = {
      geojson: null,   // parsed GeoJSON currently loaded
      results: []      // array of quadkey strings from last burn
    };

    // ── Panel: DOM refs ───────────────────────────────────────────────────

    const dropZone     = document.getElementById('drop-zone');
    const zoomSelect   = document.getElementById('zoom-select');
    const clearBtn     = document.getElementById('clear-btn');
    const outputSection = document.getElementById('output-section');
    const outputBox    = document.getElementById('output-box');
    const fileInput    = document.getElementById('file-input');

    // Populate zoom dropdown 2–28
    for (let z = 2; z <= 28; z++) {
      const opt = document.createElement('option');
      opt.value = z;
      opt.textContent = `Z${z}`;
      if (z === 12) opt.selected = true;
      zoomSelect.appendChild(opt);
    }

    // ── Panel: helpers ────────────────────────────────────────────────────

    function showResults(keys) {
      panelState.results = keys;
      outputBox.textContent = keys.join('\n');
      outputSection.classList.add('visible');
    }

    function clearPanel() {
      panelState.geojson = null;
      panelState.results = [];
      outputSection.classList.remove('visible');
      outputBox.textContent = '';
      outputBox.classList.remove('copied');
      dropZone.querySelector('strong').textContent = 'Drop GeoJSON here';

      // Remove any burned geometry layer
      if (map.getLayer('burned-fill'))   map.removeLayer('burned-fill');
      if (map.getLayer('burned-line'))   map.removeLayer('burned-line');
      if (map.getSource('burned-geojson')) map.removeSource('burned-geojson');
    }

    // ── Panel: drag-and-drop + file picker ────────────────────────────────

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') fileInput.click();
    });

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) handleFile(file);
      fileInput.value = '';
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    function handleFile(file) {
      const reader = new FileReader();
      reader.onload = ev => onGeoJSONLoaded(ev.target.result, file.name);
      reader.readAsText(file);
    }

    function onGeoJSONLoaded(text, filename) {
      // Parsing + validation happens in burnGeoJSON (Phase 4).
      // For now, just store and acknowledge.
      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch (err) {
        showError(`JSON parse error: ${err.message}`);
        return;
      }
      panelState.geojson = parsed;
      dropZone.querySelector('strong').textContent = filename || 'GeoJSON loaded';
    }

    // ── Panel: clear button ───────────────────────────────────────────────

    clearBtn.addEventListener('click', clearPanel);

    // ── Panel: click-to-copy ──────────────────────────────────────────────

    outputBox.addEventListener('click', () => {
      if (!panelState.results.length) return;
      navigator.clipboard.writeText(panelState.results.join('\n')).then(() => {
        outputBox.classList.add('copied');
        setTimeout(() => outputBox.classList.remove('copied'), 1200);
      });
    });
    outputBox.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') outputBox.click();
    });

    // ── Error modal (stub — wired up in Phase 4) ──────────────────────────

    function showError(msg) {
      // eslint-disable-next-line no-console
      console.error('[burntotile]', msg);
      let modal = document.getElementById('error-modal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'error-modal';
        Object.assign(modal.style, {
          position: 'fixed', inset: '0', display: 'flex',
          alignItems: 'center', justifyContent: 'center', zIndex: '9999',
          background: 'rgba(0,0,0,0.35)'
        });
        document.body.appendChild(modal);
      }
      modal.innerHTML = `
        <div style="background:#c0392b;color:#fff;padding:24px 28px;border-radius:8px;
                    max-width:420px;font-family:system-ui,sans-serif;line-height:1.5;
                    box-shadow:0 4px 24px rgba(0,0,0,0.4)">
          <strong style="display:block;font-size:15px;margin-bottom:8px">Error</strong>
          <span>${msg}</span>
          <div style="text-align:right;margin-top:16px">
            <button onclick="this.closest('#error-modal').remove()"
              style="background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);
                     padding:6px 16px;border-radius:4px;cursor:pointer;font-size:13px">
              Dismiss
            </button>
          </div>
        </div>`;
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    // ── Wire up quadkey grid after map loads ──────────────────────────────

    map.on('load', () => {
      map.addSource('qk-grid', {
        type: 'geojson',
        data: buildQKGrid(map)
      });

      // Tile outline strokes
      map.addLayer({
        id: 'qk-grid-lines',
        type: 'line',
        source: 'qk-grid',
        paint: {
          'line-color': 'rgba(220, 60, 60, 0.55)',
          'line-width': 1.5
        }
      });

      // Quadkey string labels at tile centers
      map.addLayer({
        id: 'qk-grid-labels',
        type: 'symbol',
        source: 'qk-grid',
        layout: {
          'text-field': ['get', 'qk'],
          'text-font': ['Noto Sans Regular'],
          'text-size': 12,
          'text-anchor': 'center',
          'text-allow-overlap': true,
          'symbol-placement': 'point'
        },
        paint: {
          'text-color': 'rgba(180, 30, 30, 0.95)',
          'text-halo-color': 'rgba(255, 255, 255, 0.9)',
          'text-halo-width': 2
        }
      });

      map.on('moveend', () => {
        map.getSource('qk-grid').setData(buildQKGrid(map));
      });
    });
  </script>
</body>
</html>
